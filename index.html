<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hyperwork</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- Login Screen -->

<div id="loginPage" class="page active">

    <div class="login-box">
        <h1>Hyperwork</h1>

        <input type="text" id="username" placeholder="Username">

        <input type="password" id="password" placeholder="Password">

        <button onclick="login()">Login</button>
    </div>

</div>

<!-- Main App -->

<div id="mainPage" class="page">

    <header>

        <h2>Hyperwork</h2>

        <span>GET READY TO WORK</span>

        <button onclick="logout()">Logout</button>

    </header>

    <div class="container">

        <aside>

            <button onclick="showPage('dashboard')">
                Dashboard
            </button>

            <button onclick="showPage('documents')">
                Documents
            </button>

            <button onclick="showPage('tasks')">
                Tasks
            </button>

            <button onclick="showPage('forwarding')">
                Forwarding Register
            </button>

            <button onclick="showPage('estimates')">
                Estimates
            </button>

            <button onclick="showPage('letters')">
                Letters
            </button>

            <button onclick="showPage('reports')">
                Reports
            </button>

            <button onclick="showPage('settings')">
                Settings
            </button>

        </aside>

        <main>

            <div id="dashboard" class="content-page active-content">
                <h2>Dashboard</h2>
                <p>Welcome to Hyperwork.</p>
            </div>

            <div id="documents" class="content-page">

    <h2>Document Management</h2>

    <br>

    <input type="text" id="docNumber" placeholder="Document Number">

    <input type="text" id="docSubject" placeholder="Subject">

    <input type="text" id="docFrom" placeholder="From">

    <button onclick="addDocument()">
        Add Document
    </button>

    <br><br>

    <table id="documentTable" border="1" width="100%">

        <thead>

            <tr>
                <th>Sl No</th>
                <th>Document No</th>
                <th>Subject</th>
                <th>From</th>
                <th>Action</th>
            </tr>

        </thead>

        <tbody>

        </tbody>

    </table>

</div>
            
            <div id="tasks" class="content-page">
                <h2>Task Management</h2>
            </div>

            <div id="forwarding" class="content-page">
                <h2>Forwarding Register</h2>
            </div>

            <div id="estimates" class="content-page">
                <h2>Estimate Management</h2>
            </div>

            <div id="letters" class="content-page">
                <h2>Letter Generation</h2>
            </div>

            <div id="reports" class="content-page">
                <h2>Reports</h2>
            </div>

            <div id="settings" class="content-page">
                <h2>Settings</h2>
            </div>

        </main>

    </div>

</div>

<script src="app.js"></script>

</body>
</html>
